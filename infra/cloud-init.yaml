#cloud-config
# Bootstrap script for OpenClaw on Hetzner CX23 (Ubuntu 24.04)
# Installs OpenClaw (via official installer), Tailscale, and UFW.

package_update: true
packages:
  - ca-certificates
  - curl
  - ufw

runcmd:
  # Install OpenClaw (HOME must be exported — cloud-init runcmd does not set it)
  - "export HOME=/root && curl -fsSL https://openclaw.ai/install.sh | bash -s -- --no-onboard"

  # Install Tailscale
  - curl -fsSL https://tailscale.com/install.sh | sh

  # Firewall — SSH only inbound
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp comment 'SSH'
  - ufw --force enable

  # Create data directories
  - mkdir -p /root/.openclaw/workspace /root/.openclaw/workspace-honey

  # Bootstrap log
  - echo "Bootstrapped at $(date --utc)" > /root/bootstrap.log
  - echo "OpenClaw $(openclaw --version 2>/dev/null || echo 'installed')" >> /root/bootstrap.log
  - echo "Tailscale $(tailscale version)" >> /root/bootstrap.log
  - echo "UFW enabled — SSH (22) only" >> /root/bootstrap.log
